# WireViz: Stepper port + Enable/E-stop (one port, one driver)
# See stage_wiring.md for design rationale.
# One stepper per ATYPE-43 primary port (pins 1-4). Ports: 4=X 5=Y 6=Z 7=Rz.
# (The P849 N+8 second-axis-per-connector scheme did not work; see Configuration.md.)
# NOTE: SCSI wire colours are nominal -- some cables have swapped diff pairs.

metadata:
  title: ILEMT Stage - Stepper Port & Enable/E-Stop (one driver per port)

connectors:
  MC508_STEP:
    type: MDR-20
    notes: "MC508 Stepper Port (ATYPE 43 primary, P849)"
    pins: [1, 3, 7, 8, 15]
    pinlabels: ["Pulse+", "Dir+", WDOG+, WDOG-, 0V]

  DRV:
    type: Screw Terminal
    notes: "KL-4030 Driver"
    pins: [1, 2, 3, 4, 5, 6]
    pinlabels: ["PUL+", "PUL-", "DIR+", "DIR-", "ENA+", "ENA-"]

  ESTOP:
    type: NC Pushbutton
    notes: "Emergency Stop"
    pins: [1, 2]
    pinlabels: [COM, NC]
    color: RD

  EXT5V:
    type: Power Supply
    notes: "External 5V (enable circuit)"
    pins: [1, 2]
    pinlabels: ["+5V", GND]

  TIE_0V:
    style: simple
    type: Splice
    notes: "0V tie point"

cables:
  STEP_PUL:
    wirecount: 1
    notes: "Pulse+ (SCSI pin 1)"
    colors: [BK]

  STEP_DIR:
    wirecount: 1
    notes: "Dir+ (SCSI pin 3)"
    colors: [RD]

  # SCSI cable wire from 0V (pin 15) - white/brown
  GND_SCSI:
    wirecount: 1
    notes: "0V SCSI wire (pin 15)"
    colors: [WHBN]

  GND_1:
    wirecount: 1
    notes: "Driver PUL- ground"
    colors: [BK]

  GND_2:
    wirecount: 1
    notes: "Driver DIR- ground"
    colors: [BK]

  PWR:
    wirecount: 1
    notes: "+5V to E-stop"
    colors: [RD]

  ES:
    wirecount: 1
    notes: "E-stop to WDOG+ (SCSI pin 7)"
    colors: [BU]

  # SCSI cable wire from WDOG- (pin 8) - purple
  WDOG_SCSI:
    wirecount: 1
    notes: "WDOG- SCSI wire (pin 8)"
    colors: [VT]

  WD:
    wirecount: 1
    notes: "WDOG- to Driver ENA+"
    colors: [OG]

  R:
    wirecount: 1
    notes: "Driver ENA- return"
    colors: [BK]

connections:
  # Primary axis: MC508 Pulse+/Dir+ -> Driver PUL+/DIR+ (single-ended)
  -
    - MC508_STEP: [1]
    - STEP_PUL: [1]
    - DRV: [1]
  -
    - MC508_STEP: [3]
    - STEP_DIR: [1]
    - DRV: [3]

  # MC508 0V (WHT/BRN SCSI wire) -> tie point
  -
    - MC508_STEP: [15]
    - GND_SCSI: [1]
    - TIE_0V: [1]

  # 0V tie point -> Driver PUL-/DIR-
  -
    - TIE_0V: [1]
    - GND_1: [1]
    - DRV: [2]
  -
    - TIE_0V: [1]
    - GND_2: [1]
    - DRV: [4]

  # Enable: 5V -> E-stop -> WDOG+
  -
    - EXT5V: [1]
    - PWR: [1]
    - ESTOP: [1]
  -
    - ESTOP: [2]
    - ES: [1]
    - MC508_STEP: [7]

  # WDOG- (PUR SCSI wire) -> Driver ENA+
  -
    - MC508_STEP: [8]
    - WDOG_SCSI: [1]
    - DRV: [5]

  # Driver ENA- return -> 5V GND
  -
    - DRV: [6]
    - R: [1]
    - EXT5V: [2]
