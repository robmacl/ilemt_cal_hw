# WireViz: Stepper port -> one KL-4030 driver (generic, one port per driver)
# See stage_wiring.md for design rationale.
# Ports: 4=X 5=Y 6=Z 7=Rz, each a primary ATYPE-43 axis (pins 1-4).
#
# The driver ENABLE is NOT generated here. It is produced on the front panel
# (E-stop + WDOG-relay-buffered PNP, see Pics/front_panel_schematic.jpg) and
# distributed to ALL drivers as a shared bus: OG = ENA+ ("disable" line),
# BK = ENA- (system ground, returns to +5V). The MC508 WDOG relay reaches the
# front panel via the PORT 6 (Z) cable only (pins 7/8, BU/VT). This drawing
# shows that shared enable as the FP_ENABLE dummy connector.
#
# NOTE: SCSI wire colours are nominal -- some cables have swapped diff pairs.

metadata:
  title: ILEMT Stage - Stepper Port to KL-4030 (one driver per port)

connectors:
  MC508_STEP:
    type: MDR-20
    notes: "MC508 Stepper Port (ATYPE 43 primary). Pins 1/3/15 used."
    pins: [1, 3, 15]
    pinlabels: ["Pulse+", "Dir+", "0V"]

  DRV:
    type: Screw Terminal
    notes: "KL-4030 Driver (one per port)"
    pins: [1, 2, 3, 4, 5, 6]
    pinlabels: ["PUL+", "PUL-", "DIR+", "DIR-", "ENA+", "ENA-"]

  FP_ENABLE:
    type: Front-panel enable bus
    notes: "Driver enable/disable, generated on the front panel (E-stop +
      WDOG-buffered PNP; see Pics/front_panel_schematic.jpg). Shared by all
      drivers. ENA+ is active-LOW = disable."
    pins: [1, 2]
    pinlabels: ["ENA+ (disable)", "ENA- (sys GND)"]

  TIE_0V:
    style: simple
    type: Splice
    notes: "MC508 0V tie (step/dir ground reference)"

cables:
  STEP_PUL:
    wirecount: 1
    notes: "Pulse+ (SCSI pin 1)"
    colors: [BK]

  STEP_DIR:
    wirecount: 1
    notes: "Dir+ (SCSI pin 3)"
    colors: [RD]

  GND_SCSI:
    wirecount: 1
    notes: "0V (SCSI pin 15)"
    colors: [WHBN]

  GND_1:
    wirecount: 1
    notes: "0V to Driver PUL-"
    colors: [WHBN]

  GND_2:
    wirecount: 1
    notes: "0V to Driver DIR-"
    colors: [WHBN]

  ENA_P:
    wirecount: 1
    notes: "Front-panel enable to Driver ENA+"
    colors: [OG]

  ENA_N:
    wirecount: 1
    notes: "Driver ENA- to system ground"
    colors: [BK]

connections:
  # Step/Dir: MC508 Pulse+/Dir+ -> Driver PUL+/DIR+ (single-ended)
  -
    - MC508_STEP: [1]
    - STEP_PUL: [1]
    - DRV: [1]
  -
    - MC508_STEP: [3]
    - STEP_DIR: [1]
    - DRV: [3]

  # MC508 0V -> tie -> Driver PUL-/DIR-
  -
    - MC508_STEP: [15]
    - GND_SCSI: [1]
    - TIE_0V: [1]
  -
    - TIE_0V: [1]
    - GND_1: [1]
    - DRV: [2]
  -
    - TIE_0V: [1]
    - GND_2: [1]
    - DRV: [4]

  # Enable bus (front panel) -> Driver ENA+/ENA-
  -
    - FP_ENABLE: [1]
    - ENA_P: [1]
    - DRV: [5]
  -
    - FP_ENABLE: [2]
    - ENA_N: [1]
    - DRV: [6]
